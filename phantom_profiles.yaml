# Phantom QA Profiles
# Maps phantom names to their geometric and material reference data.
# Consumed by PhantomAdapterFactory to select the correct adapter.

schema_version: "1.0"

profiles:

  siemens_water_phantom:
    display_name: "Siemens Water Phantom (Standard Cylindrical)"
    series_description_match:
      - "Water Phantom"
      - "QA_WATER"
      - "WASSERPHANTOM"
      - "QA Head"
      - "QA Body"
    protocol_name_match:
      - "QA"
      - "QC"
    adapter_class: "SiemensWaterPhantomAdapter"
    outer_diameter_mm: 200.0
    has_edge_insert: false
    has_density_inserts: false
    # 5-ROI layout: center + 4 clock positions
    # Positions are computed relative to detected center
    roi_layout:
      center:         { radius_mm: 0.0,  angle_deg: 0.0,   roi_diameter_mm: 30.0 }
      peripheral_12:  { radius_mm: 60.0, angle_deg: 0.0,   roi_diameter_mm: 20.0 }
      peripheral_3:   { radius_mm: 60.0, angle_deg: 90.0,  roi_diameter_mm: 20.0 }
      peripheral_6:   { radius_mm: 60.0, angle_deg: 180.0, roi_diameter_mm: 20.0 }
      peripheral_9:   { radius_mm: 60.0, angle_deg: 270.0, roi_diameter_mm: 20.0 }
    material_references:
      water:  { nominal_hu: 0,     red: 1.000 }
    hu_tolerance: 4.0

  ge_helios_qa:
    display_name: "GE Helios QA Phantom"
    series_description_match:
      - "Helios"
      - "QA_HELIOS"
      - "GE QA"
    protocol_name_match:
      - "Helios"
      - "QA"
    adapter_class: "HeliosQAPhantomAdapter"
    outer_diameter_mm: 200.0
    has_edge_insert: true
    has_density_inserts: true
    # 7 inserts at fixed angles — see GE Helios manual P/N 2165993-100
    roi_layout:
      water:        { radius_mm: 0.0,  angle_deg: 0.0,   roi_diameter_mm: 20.0 }
      air:          { radius_mm: 58.0, angle_deg: 0.0,   roi_diameter_mm: 20.0 }
      acrylic:      { radius_mm: 58.0, angle_deg: 60.0,  roi_diameter_mm: 20.0 }
      ldpe:         { radius_mm: 58.0, angle_deg: 120.0, roi_diameter_mm: 20.0 }
      polystyrene:  { radius_mm: 58.0, angle_deg: 180.0, roi_diameter_mm: 20.0 }
      delrin:       { radius_mm: 58.0, angle_deg: 240.0, roi_diameter_mm: 20.0 }
      teflon:       { radius_mm: 58.0, angle_deg: 300.0, roi_diameter_mm: 20.0 }
    material_references:
      water:        { nominal_hu: 0,     red: 1.000 }
      air:          { nominal_hu: -1000, red: 0.001 }
      acrylic:      { nominal_hu: 120,   red: 1.173 }
      ldpe:         { nominal_hu: -100,  red: 0.944 }
      polystyrene:  { nominal_hu: -35,   red: 0.976 }
      delrin:       { nominal_hu: 340,   red: 1.359 }
      teflon:       { nominal_hu: 990,   red: 1.869 }
    hu_tolerance: 4.0

  generic:
    display_name: "Generic QA Phantom"
    series_description_match: []
    protocol_name_match: []
    adapter_class: "GenericPhantomAdapter"
    outer_diameter_mm: 200.0
    has_edge_insert: false
    has_density_inserts: false
    roi_layout:
      center:         { radius_mm: 0.0,  angle_deg: 0.0,   roi_diameter_mm: 30.0 }
      peripheral_12:  { radius_mm: 60.0, angle_deg: 0.0,   roi_diameter_mm: 20.0 }
      peripheral_3:   { radius_mm: 60.0, angle_deg: 90.0,  roi_diameter_mm: 20.0 }
      peripheral_6:   { radius_mm: 60.0, angle_deg: 180.0, roi_diameter_mm: 20.0 }
      peripheral_9:   { radius_mm: 60.0, angle_deg: 270.0, roi_diameter_mm: 20.0 }
    material_references:
      water: { nominal_hu: 0, red: 1.000 }
    hu_tolerance: 5.0
